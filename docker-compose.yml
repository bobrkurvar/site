services:
  app:
    container_name: site_app
    build:
      context: .
      dockerfile: ./Dockerfile
      target: main_app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      API_HOST: image_service
    networks:
      - internal
    depends_on:
      - postgres
    volumes:
      - ./static/images:/pysite/static/images # bind mount docker compose down -v не удалит этот том
    restart: unless-stopped

  image_service:
    container_name: site_image
    build:
      context: .
      dockerfile: ./Dockerfile
      target: image
    env_file:
      - .env
    environment:
      PORT: ${IMAGE_PORT}
    networks:
      - internal
    restart: unless-stopped

  postgres:
    container_name: site_db
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - internal
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init/backup.sql:/docker-entrypoint-initdb.d/01-backup.sql:ro # при пустой базе выполнит всё что в этой папке
    restart: unless-stopped

  migrate:
    container_name: site_migrate
    profiles: ["tools"]
    build:
      context: .
      dockerfile: ./Dockerfile
      target: migrate
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - internal
    depends_on:
      - postgres
    restart: "no"

  runner:
    container_name: site_runner
    profiles: ["tools"]
    build:
      context: .
      dockerfile: ./Dockerfile
      target: runner
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - internal
    depends_on:
      - postgres
    restart: "no"

  resize-images-script:
    container_name: resize-images-script
    profiles: [ "tools" ]
    build:
      context: .
      dockerfile: ./Dockerfile
      target: resize-images-script
    env_file:
      - .env
    volumes:
      - ./static/images:/pysite/static/images # bind mount docker compose down -v не удалит этот том
    restart: "no"


  nginx:
    container_name: site_nginx
    image: nginx:1.27-alpine
    depends_on:
      - app
    volumes:
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./static:/var/www/static:ro
    restart: unless-stopped

    networks:
      - internal
      - traefik-public

    labels:
      - traefik.enable=true

      # домен проекта
      - traefik.http.routers.project1.rule=Host(`keramovibor.ru`) || Host(`www.keramovibor.ru`)
      - traefik.http.routers.project1.entrypoints=websecure
      - traefik.http.routers.project1.tls.certresolver=le

      # какой внутренний порт слушает nginx в контейнере
      - traefik.http.services.project1.loadbalancer.server.port=80

      # в какой docker-сети traefik должен найти контейнер
      - traefik.docker.network=traefik-public


networks:
  internal:
    driver: bridge

  traefik-public:
    external: true

volumes:
  pgdata: