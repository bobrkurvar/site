<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="0UaXRS2jVp-IZaGTRrl3ORajES3srOT5c4QIRz6gMuY" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/images/base/logo2.png">
    <title>{% block title %}Керамовыбор{% endblock %}</title>
    <!--<link rel="icon" href="/static/images/logo2.png">-->
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="preload" href="/static/images/base/background.jpg" as="image" fetchpriority="high">
    <link rel="preload" href="/static/images/base/logo2.png" as="image">
    {% block extra_head %}{% endblock %}
    {% block extra_css %}{% endblock %}
</head>

<body>
<header class="main-header">

    <!-- Верхняя часть шапки -->
    <div class="header-top">
        <div class="header-left">
            <a href="/" class="logo-link">
                <img src="/static/images/base/logo2.png" alt="Логотип" class="logo-image">
                <span class="site-name">Керамовыбор</span>
            </a>
        </div>

        <div class="header-right">
            <span class="contact-item link-style">📞 +7 (900) 952-28-08</span>
            <span class="contact-item link-style">✉ mail-lena@yandex.ru</span>
        </div>
    </div>

    <!-- Нижняя часть — вкладки -->
    <nav class="header-menu">
        <a href="/" class="menu-link {% if request.url.path == '/' %}active{% endif %}">Главная</a>
        <div class="menu-dropdown">
            <button class="menu-link dropdown-btn">
                Каталог
            </button>

            <div class="dropdown-menu">
                {% for category in categories %}
                    <a href="/catalog/{{ category.slug }}/products">{{ category.name }}</a>
                {% endfor %}
            </div>
        </div>


        <a href="/clients" class="menu-link {% if request.url.path.startswith('/clients') %}active{% endif %}">Для клиентов</a>
    </nav>

</header>

<main>
    {% block content %}
    {% endblock %}
</main>

{% block extra_js %}
{% endblock %}

<script src="/static/js/base.js"></script>

</body>
</html>
